<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link href="editProfile.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Profile Section -->
    <div class="container my-4" style="margin-top: 150px !important;">
        <div class="profile-container">
            <h2 class="text-primary"><i class="fa-solid fa-user-circle"></i></h2>

            <div class="profile-info">
                <strong>First Name:</strong> <span id="firstName"></span>
            </div>
            <div class="profile-info">
                <strong>Last Name:</strong> <span id="lastName"></span>
            </div>
            <div class="profile-info">
                <strong>Age:</strong> <span id="age"></span>
            </div>
            <div class="profile-info">
                <strong>Date of Birth:</strong> <span id="dob"></span>
            </div>
            <div class="profile-info">
                <strong>Username:</strong> <span id="username"></span>
            </div>
            <div class="profile-info">
                <strong>Email:</strong> <span id="email"></span>
            </div>

            <div class="edit-btn">
                <a href="edit-register.html" class="btn btn-primary"><i class="fa-solid fa-edit"></i> Edit Profile</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const userInfo = JSON.parse(localStorage.getItem("UserInfo"))
            if (userInfo) {
                document.getElementById("firstName").textContent = userInfo.firstName;
                document.getElementById("lastName").textContent = userInfo.lastName;
                document.getElementById("age").textContent = userInfo.age;
                document.getElementById("dob").textContent = userInfo.dob;
                document.getElementById("username").textContent = userInfo.username;
                document.getElementById("email").textContent = userInfo.email;
            } else {
                alert("No user is logged in. Redirecting to login page.");
                window.location.href = "login.html"; // Redirect to login if no user is found
            }
        });
    </script>
    <script>
        // Function to load the navbar dynamically
        function loadNavbar() {
            fetch("navbar.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("navbar-placeholder").innerHTML = data;

                    // Find and execute script tags
                    const scripts = document.getElementById("navbar-placeholder").getElementsByTagName("script");
                    for (let script of scripts) {
                        let newScript = document.createElement("script");
                        newScript.text = script.textContent; // Copy script content
                        document.body.appendChild(newScript); // Append and execute
                    }
                })
                .catch(error => console.error("Error loading the navbar:", error));
        }

        // Call the function when the page loads
        loadNavbar();
    </script>
</body>

</html>
