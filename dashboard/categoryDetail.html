<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS for styling -->
    <link href="categoryDetail.css" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <div id="navbar-placeholder"></div>


    <!-- Main Content -->
    <div class="container mt-5">
        <h1>Welcome to the Dashboard</h1>
        <p>This is your dashboard page. You can add more content here.</p>
        <div class="row" id="productContainer">
            <!-- Products will be inserted here dynamically -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2023 Your Company. All rights reserved.</p>
            <p class="mb-0"><a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a></p>
        </div>
    </footer>

    <!-- Bootstrap JS (Required for dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Function to load the navbar dynamically
        function loadNavbar() {
            fetch("navbar.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("navbar-placeholder").innerHTML = data;

                    // Find and execute script tags
                    const scripts = document.getElementById("navbar-placeholder").getElementsByTagName("script");
                    for (let script of scripts) {
                        let newScript = document.createElement("script");
                        newScript.text = script.textContent; // Copy script content
                        document.body.appendChild(newScript); // Append and execute
                    }
                })
                .catch(error => console.error("Error loading the navbar:", error));
        }

        // Call the function when the page loads
        loadNavbar();
    </script>
    <script type="module">
        import data from "./data.js"; const selectedProducts = window.localStorage.getItem("selectedProducts"); console.log("llll",selectedProducts); debugger; function generateProductCards() { const productContainer = document.getElementById("productContainer");
        const filteredData = selectedProducts ? JSON.parse(selectedProducts) : []; filteredData.forEach(product=> { const card = `
        <div class="col-md-3">
            <div class="card shadow-sm mb-4" onclick="saveProductAndNavigate(${product.id})">
                <img src="clothing/${product.image}" class="card-img-top" alt="${product.name}">
                <div class="card-body">
                    <h5 class="product-name">${product.name}</h5>
                    <p class="product-type">${product.type}</p>
                    <p class="product-price">Rs ₹${product.price.toLocaleString()}</p>

                </div>
            </div>
        </div>
        `; productContainer.innerHTML += card; }); } window.saveProductAndNavigate = function(productId) { const product = data.find(p => p.id === productId); if (product) { localStorage.setItem("selectedProduct", JSON.stringify(product)); window.location.href
        = "productDetail.html"; } }; document.addEventListener("DOMContentLoaded", generateProductCards);
    </script>
</body>

</html>
