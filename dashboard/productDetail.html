<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="productDetail.css" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <div id="navbar-placeholder"></div>
    <div class="container mt-5" style="margin-top: 180px !important;">
        <div class="row">
            <div class="col-md-6">
                <img id="product-image" class="product-image">
            </div>
            <div class="col-md-6">
                <h5 id="product-name" class="product-name"></h5>
                <p id="product-type" class="product-type"></p>
                <div class="rating border px-2">
                    <span class="rating-Num">4.5</span>
                    <span class="stars">
                        <i class="fas fa-star"></i>
                    </span>
                    <span class="rating-text">|</span>
                    <span class="rating-text">30000 Ratings</span>
                </div>
                <hr class="my-4">

                <p id="product-price" class="product-price"></p>
                <div>
                    <p class="product-content">inclusive of all taxes</p>
                </div>
                <div class="size-selector py-4">
                    <span>Select Size:</span>
                    <div class="size-buttons">
                        <button class="size-btn">S</button>
                        <button class="size-btn">M</button>
                        <button class="size-btn">L</button>
                        <button class="size-btn">XL</button>
                        <button class="size-btn">XXL</button>
                    </div>
                </div>

                <div class="button-group">
                    <button id="btn-add-to-bag" class="btn btn-primary btn-add-to-bag" onclick="addToBag();">
                        <i class="fas fa-shopping-bag"> &nbsp</i> ADD TO BAG
                    </button>
                    <button id="btn-go-to-bag" class="btn btn-primary btn-go-to-bag">
                        <i class="fas fa-shopping-bag"> &nbsp</i> GO TO BAG
                    </button>
                    <button id="btn-wishlist" class="btn btn-wishlist" onclick="wishlist();">
                        <i class="fas fa-heart">&nbsp</i> <i class="fa-regular fa-heart">&nbsp</i> WISHLIST
                    </button>
                    <button id="btn-wishlist-select" class="btn btn-wishlist-select">
                        <i class="fas fa-heart"></i></i>&nbsp WISHLIST
                    </button>
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Function to load the navbar dynamically
        function loadNavbar() {
            fetch("navbar.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("navbar-placeholder").innerHTML = data;

                    // Find and execute script tags
                    const scripts = document.getElementById("navbar-placeholder").getElementsByTagName("script");
                    for (let script of scripts) {
                        let newScript = document.createElement("script");
                        newScript.text = script.textContent; // Copy script content
                        document.body.appendChild(newScript); // Append and execute
                    }
                })
                .catch(error => console.error("Error loading the navbar:", error));
        }

        // Call the function when the page loads
        loadNavbar();
    </script>
    <script>
        // Retrieve product details from localStorage
        const product = JSON.parse(localStorage.getItem("selectedProduct"));
        document.getElementById("btn-go-to-bag").style.display = "none"
        document.getElementById("btn-wishlist-select").style.display = "none"

        if (product) {
            document.getElementById("product-name").innerText = product.name;
            document.getElementById("product-image").src = "clothing/" + product.image;
            document.getElementById("product-type").innerText = product.type;
            document.getElementById("product-price").innerText = "₹" + product.price.toLocaleString();
        }

        function addToBag() {
            const data = localStorage.getItem("user");
            const user = JSON.parse(data);
            const infoData = localStorage.getItem("UserInfo");
            const userInfo = JSON.parse(infoData);

            const user1 = user.map((ele) => {
                if (ele.id == userInfo.id) {
                    ele.addToBag = [...ele.addToBag, product]
                    return ele;
                }
                return ele;
            })

            userInfo.addToBag = [...userInfo.addToBag, product]

            localStorage.setItem("user", JSON.stringify(user1))
            localStorage.setItem("UserInfo", JSON.stringify(userInfo))

            document.getElementById("btn-add-to-bag").style.display = "none"
            document.getElementById("btn-go-to-bag").style.display = "inline"
        }

        function wishlist() {
            document.getElementById("btn-wishlist").style.display = "none"
            document.getElementById("btn-wishlist-select").style.display = "inline"
        }
    </script>
</body>

</html>
